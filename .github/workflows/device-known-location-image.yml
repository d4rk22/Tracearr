name: Device Known Location Image

on:
  push:
    branches:
      - codex/device-known-location
    paths:
      - .github/workflows/device-known-location-image.yml
  workflow_dispatch:

concurrency:
  group: device-known-location-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tracearr
  HUSKY: 0

jobs:
  build:
    name: Build and publish multi-architecture image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Compute immutable image metadata
        id: image
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::8}"
          tag="device-known-location-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=Tracearr
          cache-from: type=gha,scope=device-known-location
          cache-to: type=gha,mode=max,scope=device-known-location
          build-args: |
            APP_VERSION=device-known-location
            APP_TAG=${{ steps.image.outputs.tag }}
            APP_COMMIT=${{ steps.image.outputs.short_sha }}
            APP_BUILD_DATE=${{ steps.image.outputs.build_date }}
            CACHE_BUST=${{ github.sha }}

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}"

      - name: Record image reference
        run: |
          echo "### Published Tracearr image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
